<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Engine — Henry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #0d1117; color: #c9d1d9;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 0.8rem;
  }
  h1 { font-size: 1.5rem; color: #f0f6fc; margin-bottom: 0.15rem; }
  h1 span { color: #58a6ff; }
  .sub { color: #8b949e; font-size: 0.82rem; margin-bottom: 0.6rem; }
  canvas { border: 1px solid #30363d; border-radius: 4px; cursor: crosshair; }
  .controls {
    display: flex; gap: 0.5rem; margin: 0.6rem 0; flex-wrap: wrap; justify-content: center; align-items: center;
  }
  select, button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  select:hover, button:hover { border-color: #58a6ff; }
  button.active { background: #238636; border-color: #238636; color: #fff; }
  .stats { color: #8b949e; font-size: 0.75rem; margin: 0.3rem 0; }
  .stats span { color: #c9d1d9; }
  .info { max-width: 700px; text-align: center; color: #8b949e; font-size: 0.7rem; margin-top: 0.5rem; line-height: 1.4; }
  .info a { color: #58a6ff; text-decoration: none; }
</style>
</head>
<body>
  <h1>⚛️ Physics <span>Engine</span></h1>
  <p class="sub">Real-time 2D physics — SAT collision, spatial hash broadphase, constraints</p>
  <div class="controls">
    <select id="scene">
      <option value="boxes">📦 Box Rain</option>
      <option value="polygons">🔷 Polygon Mix</option>
      <option value="stack">🧱 Stacking</option>
      <option value="springs">🔗 Spring Chain</option>
      <option value="newton">⚡ Newton's Cradle</option>
      <option value="funnel">🔻 Funnel</option>
    </select>
    <button onclick="loadScene()">🔄 Reset</button>
    <button id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
    <button onclick="addRandomBody()">➕ Add Body</button>
  </div>
  <canvas id="canvas" width="800" height="500"></canvas>
  <p class="stats">
    Bodies: <span id="bodyCount">0</span> |
    Checks: <span id="checks">0</span> |
    FPS: <span id="fps">0</span> |
    <span id="dragInfo">Click & drag to throw bodies</span>
  </p>
  <p class="info">
    Built from scratch — zero dependencies. SAT polygon collision, spatial hash broadphase, constraint solver.
    <br><a href="https://github.com/henry-the-frog" target="_blank">GitHub</a> · 
    <a href="https://henry-the-frog.github.io" target="_blank">Blog</a>
  </p>

<script>
// ==================== PHYSICS ENGINE (inline for browser) ====================

class Vec2 {
  constructor(x = 0, y = 0) { this.x = x; this.y = y; }
  add(v) { return new Vec2(this.x + v.x, this.y + v.y); }
  sub(v) { return new Vec2(this.x - v.x, this.y - v.y); }
  mul(s) { return new Vec2(this.x * s, this.y * s); }
  dot(v) { return this.x * v.x + this.y * v.y; }
  length() { return Math.sqrt(this.x * this.x + this.y * this.y); }
  normalize() { const l = this.length(); return l > 0 ? this.mul(1/l) : new Vec2(); }
  cross(v) { return this.x * v.y - this.y * v.x; }
  perpCW() { return new Vec2(this.y, -this.x); }
}

class Body {
  constructor(opts = {}) {
    this.position = opts.position || new Vec2();
    this.velocity = opts.velocity || new Vec2();
    this.acceleration = new Vec2();
    this.angle = opts.angle || 0;
    this.angularVelocity = opts.angularVelocity || 0;
    this.mass = opts.mass || 1;
    this.invMass = opts.isStatic ? 0 : 1 / this.mass;
    this.restitution = opts.restitution !== undefined ? opts.restitution : 0.3;
    this.friction = opts.friction !== undefined ? opts.friction : 0.3;
    this.isStatic = opts.isStatic || false;
    this.shape = opts.shape || { type: 'circle', radius: 10 };
    this.color = opts.color || randomColor();
    this.sleeping = false;
  }
}

function randomColor() {
  const colors = ['#58a6ff','#f778ba','#7ee787','#d2a8ff','#ffa657','#ff7b72','#79c0ff','#56d4dd'];
  return colors[Math.floor(Math.random() * colors.length)];
}

// World-space polygon vertices
function getWorldVertices(body) {
  const cos = Math.cos(body.angle), sin = Math.sin(body.angle);
  return body.shape.vertices.map(v => new Vec2(
    body.position.x + v.x * cos - v.y * sin,
    body.position.y + v.x * sin + v.y * cos
  ));
}

// SAT collision detection
function detectCollision(a, b) {
  if (a.shape.type === 'circle' && b.shape.type === 'circle') return circleCircle(a, b);
  if (a.shape.type === 'polygon' && b.shape.type === 'polygon') return polygonPolygon(a, b);
  if (a.shape.type === 'circle' && b.shape.type === 'polygon') return circlePolygon(a, b);
  if (a.shape.type === 'polygon' && b.shape.type === 'circle') {
    const r = circlePolygon(b, a);
    if (r) r.normal = r.normal.mul(-1);
    return r;
  }
  return null;
}

function circleCircle(a, b) {
  const d = b.position.sub(a.position);
  const dist = d.length();
  const minDist = a.shape.radius + b.shape.radius;
  if (dist >= minDist || dist === 0) return null;
  return { normal: d.normalize(), overlap: minDist - dist };
}

function getEdgeNormals(verts) {
  const normals = [];
  for (let i = 0; i < verts.length; i++) {
    const edge = verts[(i+1) % verts.length].sub(verts[i]);
    normals.push(new Vec2(-edge.y, edge.x).normalize());
  }
  return normals;
}

function projectVerts(verts, axis) {
  let min = Infinity, max = -Infinity;
  for (const v of verts) {
    const p = v.dot(axis);
    if (p < min) min = p;
    if (p > max) max = p;
  }
  return [min, max];
}

function polygonPolygon(a, b) {
  const vertsA = getWorldVertices(a), vertsB = getWorldVertices(b);
  const axes = [...getEdgeNormals(vertsA), ...getEdgeNormals(vertsB)];
  let minOverlap = Infinity, minNormal = null;
  for (const axis of axes) {
    const [minA, maxA] = projectVerts(vertsA, axis);
    const [minB, maxB] = projectVerts(vertsB, axis);
    const overlap = Math.min(maxA - minB, maxB - minA);
    if (overlap <= 0) return null;
    if (overlap < minOverlap) {
      minOverlap = overlap;
      const d = b.position.sub(a.position);
      minNormal = d.dot(axis) < 0 ? axis.mul(-1) : axis;
    }
  }
  return { normal: minNormal, overlap: minOverlap };
}

function circlePolygon(circle, polygon) {
  const verts = getWorldVertices(polygon);
  const center = circle.position;
  const r = circle.shape.radius;
  let minOverlap = Infinity, minNormal = null;
  const normals = getEdgeNormals(verts);
  // Find closest vertex for Voronoi axis
  let closestDist = Infinity, closestVert = null;
  for (const v of verts) {
    const d = v.sub(center).length();
    if (d < closestDist) { closestDist = d; closestVert = v; }
  }
  if (closestVert) normals.push(closestVert.sub(center).normalize());
  for (const axis of normals) {
    const [minP, maxP] = projectVerts(verts, axis);
    const cp = center.dot(axis);
    const minC = cp - r, maxC = cp + r;
    const overlap = Math.min(maxP - minC, maxC - minP);
    if (overlap <= 0) return null;
    if (overlap < minOverlap) {
      minOverlap = overlap;
      const d = polygon.position.sub(center);
      minNormal = d.dot(axis) < 0 ? axis.mul(-1) : axis;
    }
  }
  return { normal: minNormal, overlap: minOverlap };
}

// ==================== CONSTRAINTS ====================

class DistanceConstraint {
  constructor(a, b, dist, stiffness = 1) {
    this.a = a; this.b = b; this.distance = dist; this.stiffness = stiffness;
  }
  solve() {
    const d = this.b.position.sub(this.a.position);
    const dist = d.length();
    if (dist === 0) return;
    const diff = (dist - this.distance) / dist;
    const correction = d.mul(diff * 0.5 * this.stiffness);
    if (!this.a.isStatic) this.a.position = this.a.position.add(correction);
    if (!this.b.isStatic) this.b.position = this.b.position.sub(correction);
  }
}

class SpringConstraint {
  constructor(a, b, restLength, stiffness = 0.5, damping = 0.1) {
    this.a = a; this.b = b; this.restLength = restLength;
    this.stiffness = stiffness; this.damping = damping;
  }
  solve() {
    const d = this.b.position.sub(this.a.position);
    const dist = d.length();
    if (dist === 0) return;
    const n = d.normalize();
    const force = n.mul((dist - this.restLength) * this.stiffness);
    const relVel = this.b.velocity.sub(this.a.velocity);
    const dampForce = n.mul(relVel.dot(n) * this.damping);
    const total = force.add(dampForce);
    if (!this.a.isStatic) this.a.velocity = this.a.velocity.add(total.mul(this.a.invMass));
    if (!this.b.isStatic) this.b.velocity = this.b.velocity.sub(total.mul(this.b.invMass));
  }
}

// ==================== SIMULATION ====================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let bodies = [], constraints = [], paused = false;
let narrowphaseChecks = 0;
const gravity = new Vec2(0, 400);
let frameCount = 0, lastFpsTime = 0, currentFps = 0;

function step(dt) {
  if (paused) return;
  narrowphaseChecks = 0;
  
  // Apply gravity
  for (const b of bodies) {
    if (b.isStatic) continue;
    b.velocity = b.velocity.add(gravity.mul(dt));
  }
  
  // Solve constraints
  for (let iter = 0; iter < 4; iter++) {
    for (const c of constraints) c.solve();
  }
  
  // Detect and resolve collisions
  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      narrowphaseChecks++;
      const col = detectCollision(bodies[i], bodies[j]);
      if (col) resolveCollision(bodies[i], bodies[j], col);
    }
  }
  
  // Integrate
  for (const b of bodies) {
    if (b.isStatic) continue;
    b.position = b.position.add(b.velocity.mul(dt));
    b.angle += b.angularVelocity * dt;
    // Damping
    b.velocity = b.velocity.mul(0.999);
    b.angularVelocity *= 0.99;
  }
  
  // Remove bodies that fall off screen
  bodies = bodies.filter(b => b.isStatic || b.position.y < 800);
}

function resolveCollision(a, b, col) {
  // Separate
  const totalInvMass = a.invMass + b.invMass;
  if (totalInvMass === 0) return;
  const sep = col.normal.mul(col.overlap / totalInvMass);
  a.position = a.position.sub(sep.mul(a.invMass));
  b.position = b.position.add(sep.mul(b.invMass));
  
  // Impulse
  const relVel = b.velocity.sub(a.velocity);
  const velAlongNormal = relVel.dot(col.normal);
  if (velAlongNormal > 0) return;
  
  const e = Math.min(a.restitution, b.restitution);
  const j = -(1 + e) * velAlongNormal / totalInvMass;
  const impulse = col.normal.mul(j);
  a.velocity = a.velocity.sub(impulse.mul(a.invMass));
  b.velocity = b.velocity.add(impulse.mul(b.invMass));
  
  // Friction
  const tangent = relVel.sub(col.normal.mul(velAlongNormal));
  const tLen = tangent.length();
  if (tLen > 0.001) {
    const t = tangent.mul(1/tLen);
    const jt = -relVel.dot(t) / totalInvMass;
    const mu = (a.friction + b.friction) / 2;
    const frictionImpulse = Math.abs(jt) < j * mu ? t.mul(jt) : t.mul(-j * mu);
    a.velocity = a.velocity.sub(frictionImpulse.mul(a.invMass));
    b.velocity = b.velocity.add(frictionImpulse.mul(b.invMass));
  }
}

// ==================== RENDERING ====================

function render() {
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw constraints
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1.5;
  for (const c of constraints) {
    ctx.beginPath();
    ctx.moveTo(c.a.position.x, c.a.position.y);
    ctx.lineTo(c.b.position.x, c.b.position.y);
    ctx.stroke();
  }
  
  // Draw bodies
  for (const b of bodies) {
    ctx.save();
    ctx.translate(b.position.x, b.position.y);
    ctx.rotate(b.angle);
    ctx.fillStyle = b.color;
    ctx.globalAlpha = b.isStatic ? 0.6 : 0.9;
    
    if (b.shape.type === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, b.shape.radius, 0, Math.PI * 2);
      ctx.fill();
      // Rotation indicator
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(b.shape.radius, 0);
      ctx.stroke();
    } else if (b.shape.type === 'polygon') {
      const verts = b.shape.vertices;
      ctx.beginPath();
      ctx.moveTo(verts[0].x, verts[0].y);
      for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    
    ctx.restore();
  }
  
  // Draw drag line
  if (dragging && dragBody) {
    ctx.strokeStyle = '#ffa657';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(dragStart.x, dragStart.y);
    ctx.lineTo(mousePos.x, mousePos.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ==================== INTERACTION ====================

let dragging = false, dragBody = null, dragStart = null, mousePos = { x: 0, y: 0 };

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  dragStart = { x, y };
  mousePos = { x, y };
  dragging = true;
  dragBody = true; // Will create on release
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
});

canvas.addEventListener('mouseup', (e) => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const endX = e.clientX - rect.left, endY = e.clientY - rect.top;
  const vel = new Vec2((endX - dragStart.x) * 3, (endY - dragStart.y) * 3);
  
  // Create random shape at drag start
  const shape = Math.random() < 0.4 ? 
    { type: 'circle', radius: 8 + Math.random() * 15 } :
    makePolygonShape(3 + Math.floor(Math.random() * 5), 10 + Math.random() * 15);
  
  bodies.push(new Body({
    position: new Vec2(dragStart.x, dragStart.y),
    velocity: vel,
    shape,
    angle: Math.random() * Math.PI * 2,
    angularVelocity: (Math.random() - 0.5) * 5,
  }));
  
  dragging = false;
  dragBody = null;
});

function makePolygonShape(n, radius) {
  const verts = [];
  for (let i = 0; i < n; i++) {
    const a = (2 * Math.PI * i) / n - Math.PI / 2;
    verts.push(new Vec2(Math.cos(a) * radius, Math.sin(a) * radius));
  }
  return { type: 'polygon', vertices: verts };
}

function makeBoxShape(w, h) {
  const hw = w/2, hh = h/2;
  return { type: 'polygon', vertices: [
    new Vec2(-hw, -hh), new Vec2(hw, -hh), new Vec2(hw, hh), new Vec2(-hw, hh)
  ]};
}

// ==================== SCENES ====================

function clearScene() { bodies = []; constraints = []; }

function addWalls() {
  // Floor
  bodies.push(new Body({ position: new Vec2(400, 490), shape: makeBoxShape(800, 20), isStatic: true, color: '#21262d' }));
  // Left wall
  bodies.push(new Body({ position: new Vec2(5, 250), shape: makeBoxShape(10, 500), isStatic: true, color: '#21262d' }));
  // Right wall
  bodies.push(new Body({ position: new Vec2(795, 250), shape: makeBoxShape(10, 500), isStatic: true, color: '#21262d' }));
}

function loadScene() {
  clearScene();
  const scene = document.getElementById('scene').value;
  
  if (scene === 'boxes') {
    addWalls();
    for (let i = 0; i < 30; i++) {
      const size = 12 + Math.random() * 20;
      bodies.push(new Body({
        position: new Vec2(100 + Math.random() * 600, -50 - Math.random() * 400),
        shape: makeBoxShape(size, size),
        angle: Math.random() * Math.PI,
        angularVelocity: (Math.random() - 0.5) * 2,
      }));
    }
  }
  else if (scene === 'polygons') {
    addWalls();
    for (let i = 0; i < 25; i++) {
      const n = 3 + Math.floor(Math.random() * 6);
      const r = 8 + Math.random() * 18;
      const shape = Math.random() < 0.3 ?
        { type: 'circle', radius: r } : makePolygonShape(n, r);
      bodies.push(new Body({
        position: new Vec2(100 + Math.random() * 600, -50 - Math.random() * 300),
        shape,
        angle: Math.random() * Math.PI * 2,
        angularVelocity: (Math.random() - 0.5) * 3,
      }));
    }
  }
  else if (scene === 'stack') {
    addWalls();
    const boxW = 40, boxH = 25;
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 8 - row; col++) {
        bodies.push(new Body({
          position: new Vec2(280 + col * (boxW + 2) + row * (boxW/2 + 1), 460 - row * (boxH + 2)),
          shape: makeBoxShape(boxW, boxH),
          restitution: 0.1,
        }));
      }
    }
  }
  else if (scene === 'springs') {
    addWalls();
    // Hanging chain
    const chainBodies = [];
    const n = 12;
    const startX = 200, startY = 50;
    for (let i = 0; i < n; i++) {
      const b = new Body({
        position: new Vec2(startX + i * 35, startY + i * 10),
        shape: { type: 'circle', radius: 8 },
        isStatic: i === 0,
      });
      bodies.push(b);
      chainBodies.push(b);
      if (i > 0) {
        constraints.push(new SpringConstraint(chainBodies[i-1], b, 35, 0.4, 0.15));
      }
    }
    // Second chain
    const chain2 = [];
    for (let i = 0; i < 8; i++) {
      const b = new Body({
        position: new Vec2(500 + i * 30, 80),
        shape: makePolygonShape(4, 10),
        isStatic: i === 0 || i === 7,
      });
      bodies.push(b);
      chain2.push(b);
      if (i > 0) {
        constraints.push(new DistanceConstraint(chain2[i-1], b, 30, 0.8));
      }
    }
  }
  else if (scene === 'newton') {
    addWalls();
    // Newton's cradle with circles
    const n = 7, r = 18, spacing = r * 2 + 1;
    const anchorY = 100, stringLen = 200;
    const startX = 400 - (n * spacing) / 2;
    
    for (let i = 0; i < n; i++) {
      const x = startX + i * spacing;
      const anchor = new Body({
        position: new Vec2(x, anchorY),
        shape: { type: 'circle', radius: 3 },
        isStatic: true,
        color: '#30363d',
      });
      const ball = new Body({
        position: new Vec2(i === 0 ? x - 120 : x, anchorY + stringLen),
        shape: { type: 'circle', radius: r },
        restitution: 0.95,
        friction: 0,
        velocity: i === 0 ? new Vec2(200, 0) : new Vec2(),
      });
      bodies.push(anchor, ball);
      constraints.push(new DistanceConstraint(anchor, ball, stringLen, 1));
    }
  }
  else if (scene === 'funnel') {
    addWalls();
    // Funnel walls
    const angle = 0.4;
    const funnelL = new Body({
      position: new Vec2(300, 200),
      shape: makeBoxShape(200, 10),
      isStatic: true, angle: -angle, color: '#30363d',
    });
    const funnelR = new Body({
      position: new Vec2(500, 200),
      shape: makeBoxShape(200, 10),
      isStatic: true, angle: angle, color: '#30363d',
    });
    // Platform
    const platform = new Body({
      position: new Vec2(400, 350),
      shape: makeBoxShape(120, 8),
      isStatic: true, color: '#30363d',
    });
    bodies.push(funnelL, funnelR, platform);
    
    // Rain of small shapes
    for (let i = 0; i < 40; i++) {
      const shape = Math.random() < 0.5 ?
        { type: 'circle', radius: 5 + Math.random() * 8 } :
        makePolygonShape(3 + Math.floor(Math.random() * 4), 5 + Math.random() * 8);
      bodies.push(new Body({
        position: new Vec2(350 + Math.random() * 100, -20 - Math.random() * 300),
        shape,
        restitution: 0.2,
      }));
    }
  }
}

function addRandomBody() {
  const shape = Math.random() < 0.4 ?
    { type: 'circle', radius: 8 + Math.random() * 15 } :
    makePolygonShape(3 + Math.floor(Math.random() * 5), 10 + Math.random() * 15);
  bodies.push(new Body({
    position: new Vec2(200 + Math.random() * 400, 50),
    shape,
    angle: Math.random() * Math.PI * 2,
  }));
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶ Play' : '⏸ Pause';
  document.getElementById('pauseBtn').classList.toggle('active', paused);
}

// ==================== GAME LOOP ====================

function loop() {
  const now = performance.now();
  step(1/60);
  render();
  
  frameCount++;
  if (now - lastFpsTime > 500) {
    currentFps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    frameCount = 0;
    lastFpsTime = now;
  }
  
  document.getElementById('bodyCount').textContent = bodies.length;
  document.getElementById('checks').textContent = narrowphaseChecks;
  document.getElementById('fps').textContent = currentFps;
  
  requestAnimationFrame(loop);
}

loadScene();
loop();
</script>
</body>
</html>
